# =============================================================================
# Edgecut & Co. — Design Token System
# Schema: Google Labs DESIGN.md v0.1.1 / W3C Design Tokens Format
# Source: tokens.css + DESIGN.md (salon industry marketplace, 3 tenants)
# Generated: 2026-05-13
# =============================================================================

# ---------------------------------------------------------------------------
# Metadata
# ---------------------------------------------------------------------------
version: alpha
name: Edgecut & Co.
description: >
  Sharp lines. Honest cuts. Walk in, walk out fresh. Design system for a
  3-tenant barbershop marketplace (Brooklyn, Los Angeles, Madrid) with
  marketplace token extensions for provider search, booking, and business
  operations.

# ---------------------------------------------------------------------------
# Brand Colors — Core Palette
# ---------------------------------------------------------------------------
# The brand is grounded in a near-black (#1A1C1E) that reads as charcoal,
# not dead black. Secondary is warm brass/gold. Surface is warm off-white
# like aged paper or a barber's apron.
# ---------------------------------------------------------------------------
colors:
  primary: "#1A1C1E"
  primary-hover: "#2D3035"
  primary-active: "#0F1012"
  on-primary: "#FFFFFF"

  secondary: "#B8926B"
  secondary-hover: "#C9A683"
  secondary-active: "#A67E59"
  on-secondary: "#1A1C1E"

  surface: "#FAF7F4"
  surface-alt: "#F0EAE4"
  surface-dim: "#E5DDD4"
  on-surface: "#1A1C1E"
  on-surface-dim: "#6B6258"

  error: "#C13535"
  error-surface: "#FBEAEA"
  on-error: "#FFFFFF"

  success: "#2A7D4F"
  success-surface: "#E8F5EE"
  on-success: "#FFFFFF"

  warning: "#C47A1A"
  warning-surface: "#FEF1DD"
  on-warning: "#1A1C1E"

  border: "#D9CFC4"
  border-light: "#E8E0D6"

  # Default accent (Brooklyn fallback)
  accent: "#1A5C8A"

# ---------------------------------------------------------------------------
# Marketplace Token Extensions (Rule 16)
# ---------------------------------------------------------------------------
# Independently tunable — never reuse --accent or --secondary. Each token
# exists solely for its named purpose and is independently contrast-optimized.
# ---------------------------------------------------------------------------
  # Star ratings — filled & empty
  rating: "#E8A838"
  rating-empty: "#D9CFC4"

  # Distance display text
  distance: "#5A7D8C"

  # "Available now" badge
  available-now-bg: "#E8F5EE"
  available-now-fg: "#2A7D4F"

  # Verified review badge
  verified-bg: "#E0EEF8"
  verified-fg: "#1A6F9E"

  # Deposit amount pill
  deposit-pill-bg: "#FEF1DD"
  deposit-pill-fg: "#8A5E1A"

  # Cancel policy warning banner
  policy-warn-bg: "#FBEAEA"
  policy-warn-fg: "#C13535"

  # Sponsored label
  sponsored-bg: "#F0EAE4"
  sponsored-fg: "#6B6258"

  # Realtime dot states (fresh <30s / stale 30-60s / dead >60s)
  fresh-dot: "#2A7D4F"
  stale-dot: "#C47A1A"
  dead-dot: "#9E9285"

  # Tenant-specific accent colors (applied via [data-tenant] selectors)
  tenant-brooklyn-accent: "#1A5C8A"
  tenant-la-accent: "#8A4A2B"
  tenant-madrid-accent: "#8A1A3E"

# ---------------------------------------------------------------------------
# Typography
# ---------------------------------------------------------------------------
# Typeface pairing:
#   Display  → DM Serif Display (Georgia, serif)   — editorial headlines
#   UI       → Inter (system-ui, sans-serif)        — body, buttons, labels
#   Mono     → JetBrains Mono (Menlo, monospace)    — code, numbers, metadata
# Scale: 1.25 major third (display) / 1.125 major second (body)
# ---------------------------------------------------------------------------
typography:
  display-xl:
    fontFamily: "\"DM Serif Display\", Georgia, serif"
    fontSize: 4rem
    fontWeight: 400
    lineHeight: 1.05
    letterSpacing: -0.02em

  display-lg:
    fontFamily: "\"DM Serif Display\", Georgia, serif"
    fontSize: 3rem
    fontWeight: 400
    lineHeight: 1.1
    letterSpacing: -0.01em

  display-md:
    fontFamily: "\"DM Serif Display\", Georgia, serif"
    fontSize: 2.25rem
    fontWeight: 400
    lineHeight: 1.15
    letterSpacing: 0px

  headline-lg:
    fontFamily: "Inter, system-ui, sans-serif"
    fontSize: 1.75rem
    fontWeight: 700
    lineHeight: 1.2
    letterSpacing: -0.01em

  headline-md:
    fontFamily: "Inter, system-ui, sans-serif"
    fontSize: 1.375rem
    fontWeight: 600
    lineHeight: 1.25
    letterSpacing: 0px

  headline-sm:
    fontFamily: "Inter, system-ui, sans-serif"
    fontSize: 1.125rem
    fontWeight: 600
    lineHeight: 1.3
    letterSpacing: 0px

  title-lg:
    fontFamily: "Inter, system-ui, sans-serif"
    fontSize: 1rem
    fontWeight: 600
    lineHeight: 1.4
    letterSpacing: 0.01em

  title-md:
    fontFamily: "Inter, system-ui, sans-serif"
    fontSize: 0.875rem
    fontWeight: 600
    lineHeight: 1.4
    letterSpacing: 0.02em

  body-lg:
    fontFamily: "Inter, system-ui, sans-serif"
    fontSize: 1.0625rem
    fontWeight: 400
    lineHeight: 1.6
    letterSpacing: 0px

  body-md:
    fontFamily: "Inter, system-ui, sans-serif"
    fontSize: 0.9375rem
    fontWeight: 400
    lineHeight: 1.6
    letterSpacing: 0px

  body-sm:
    fontFamily: "Inter, system-ui, sans-serif"
    fontSize: 0.8125rem
    fontWeight: 400
    lineHeight: 1.5
    letterSpacing: 0.01em

  label-md:
    fontFamily: "Inter, system-ui, sans-serif"
    fontSize: 0.8125rem
    fontWeight: 500
    lineHeight: 1.3
    letterSpacing: 0.04em
    fontFeature: "calt, case"

  label-sm:
    fontFamily: "Inter, system-ui, sans-serif"
    fontSize: 0.6875rem
    fontWeight: 500
    lineHeight: 1.3
    letterSpacing: 0.06em
    fontFeature: "calt, case"

  mono-md:
    fontFamily: "\"JetBrains Mono\", Menlo, monospace"
    fontSize: 0.875rem
    fontWeight: 400
    lineHeight: 1.5
    letterSpacing: 0px

# ---------------------------------------------------------------------------
# Spacing (4px base grid)
# ---------------------------------------------------------------------------
# Rhythm: 2 / 4 / 8 / 16 / 24 / 32 / 48 / 64 / 96
# Section spacing: 96px (desktop) / 64px (tablet) / 48px (mobile)
# ---------------------------------------------------------------------------
spacing:
  xxs: 2px
  xs: 4px
  sm: 8px
  md: 16px
  lg: 24px
  xl: 32px
  xxl: 48px
  xxxl: 64px
  section: 96px

# ---------------------------------------------------------------------------
# Border Radii
# ---------------------------------------------------------------------------
# Cards & buttons use rounded-md (8px). Deposit-pill and verified-badge use
# rounded-full for capsule shape. Realtime dots use rounded-full.
# ---------------------------------------------------------------------------
rounded:
  none: 0px
  sm: 4px
  md: 8px
  lg: 12px
  xl: 16px
  full: 9999px

# ---------------------------------------------------------------------------
# Elevation / Shadows
# ---------------------------------------------------------------------------
# Flat aesthetic with subtle elevation cues. Shadows are avoided in favor of
# thin borders and background shifts — except for these three elevation tiers.
# ---------------------------------------------------------------------------
elevation:
  raised: "0 2px 8px rgba(26, 28, 30, 0.08)"    # cards, modals
  overlay: "0 4px 16px rgba(26, 28, 30, 0.12)"   # dropdowns, pickers
  dialog: "0 8px 32px rgba(26, 28, 30, 0.16)"     # modals, sheets

# Overlay backdrop
backdrop:
  color: "rgba(26, 28, 30, 0.4)"

# ---------------------------------------------------------------------------
# prefers-contrast: more  Overrides
# ---------------------------------------------------------------------------
# When high contrast is requested, the palette shifts:
#   - Surface → pure white (#FFFFFF)
#   - Primary → pure black (#000000)
#   - Border → dark grey (#6B6258)
#   - All marketplace tokens re-checked for 4.5:1 minimum
# ---------------------------------------------------------------------------
prefers-contrast:
  more:
    colors:
      primary: "#000000"
      surface: "#FFFFFF"
      surface-alt: "#F5F2EF"
      surface-dim: "#E0D8CE"
      on-surface: "#000000"
      on-surface-dim: "#4A443C"
      secondary: "#8B6F4E"
      border: "#6B6258"
      border-light: "#9E9285"
      # Marketplace token overrides for high contrast
      deposit-pill-bg: "#FDF0CC"
      rating-empty: "#A09888"
      dead-dot: "#6B6258"

# ---------------------------------------------------------------------------
# prefers-reduced-data: reduce  Hooks
# ---------------------------------------------------------------------------
# When the user prefers reduced data transfer:
#   - Skip hero video, show static poster image only
#   - Skip map tile fetch, show list-only view
# ---------------------------------------------------------------------------
prefers-reduced-data:
  reduce:
    hero-video-display: "none"
    hero-poster-display: "block"
    map-display: "none"
    list-only-banner-display: "block"

# ---------------------------------------------------------------------------
# prefers-reduced-motion: reduce  Hooks
# ---------------------------------------------------------------------------
prefers-reduced-motion:
  reduce:
    animation-duration: "0s"
    scroll-reveal-disable: true

# ---------------------------------------------------------------------------
# Per-Tenant Overrides
# ---------------------------------------------------------------------------
# Each tenant has a distinct accent color drawn from neighborhood character,
# plus its own currency, locale, and timezone for marketplace operations.
# Applied via [data-tenant="brooklyn|la|madrid"] CSS selectors.
# ---------------------------------------------------------------------------
tenant:

  # ── Brooklyn (Bedford-Stuy) ──
  brooklyn:
    accent: "#1A5C8A"
    currency: USD
    locale: en-US
    timezone: America/New_York

  # ── Los Angeles (Silver Lake) ──
  la:
    accent: "#8A4A2B"
    currency: USD
    locale: en-US
    timezone: America/Los_Angeles

  # ── Madrid (Malasaña) ──
  madrid:
    accent: "#8A1A3E"
    currency: EUR
    locale: es-ES
    timezone: Europe/Madrid
